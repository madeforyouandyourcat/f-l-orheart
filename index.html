    <script>
        let resultLockUntil = 0;

function lockResult(seconds = 10) { // ล็อก 10 วิหลังโชว์ผล
  resultLockUntil = Date.now() + seconds * 1000;
}

function canNavigate() {
  return Date.now() >= resultLockUntil;
}

const _showPage = (pageId) => {
  console.log('[NAV] ->', pageId, 'lock?', !canNavigate());
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  // เปิดกล้องเมื่อเข้าหน้า camera
  if (pageId === 'cameraPage') {
    setTimeout(initCamera, 100);
    
    // === เพิ่มส่วนนี้เพื่อแก้ไขบัค ===
    // รีเซ็ตสถานะปุ่มถ่ายรูปให้สามารถกดได้ใหม่
    const shootButton = document.querySelector('.shoot-btn');
    if (shootButton) {
        shootButton.classList.remove('disabled');
    }
    // ซ่อนตัวเลขนับถอยหลังถ้ามันกำลังแสดงอยู่
    const countdownEl = document.getElementById('countdown-display');
    if (countdownEl) {
        countdownEl.style.display = 'none';
    }
  }
};
// ใช้ตัวนี้แทนเดิมทุกที่
function showPage(pageId) {
  // ถ้าพยายามกลับบ้านตอนล็อกอยู่ ให้บล็อก
  if ((pageId === 'homePage' || pageId === 'cameraPage') && !canNavigate()) {
    console.warn('[NAV] blocked while locked to result');
    return;
  }
  _showPage(pageId);
}
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>

<script>
/* ========= TouchDesigner TXT writer (remember file) ========= */
const DB_NAME = 'td-fsa', STORE = 'handles', KEY = 'txtHandle';
let tdFileHandle = null;

/* IndexedDB helpers */
function idbOpen(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=> {
      const db = req.result;
      if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = ()=> res(req.result);
    req.onerror   = ()=> rej(req.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,'readonly');
    const st = tx.objectStore(STORE);
    const req = st.get(key);
    req.onsuccess = ()=> res(req.result ?? null);
    req.onerror   = ()=> rej(req.error);
  });
}
async function idbSet(key,val){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,'readwrite');
    const st = tx.objectStore(STORE);
    const req = st.put(val,key);
    req.onsuccess = ()=> res();
    req.onerror   = ()=> rej(req.error);
  });
}

/* permission */
async function ensureRW(handle){
  if(!handle) return false;
  let p = await handle.queryPermission({mode:'readwrite'});
  if(p === 'granted') return true;
  if(p === 'prompt'){
    p = await handle.requestPermission({mode:'readwrite'});
    return p === 'granted';
  }
  return false;
}

/* เลือกไฟล์ครั้งแรก (เรียกใช้เมื่อสะดวก เช่นปุ่มเล็กๆมุมจอ) */
async function pickTDFile(){
  try{
    const [h] = await window.showOpenFilePicker({
      types: [{ description:'Text', accept:{'text/plain':['.txt']} }]
    });
    const ok = await ensureRW(h);
    if(!ok){ console.log('TD file: no write permission'); return false; }
    tdFileHandle = h;
    await idbSet(KEY, h);
    console.log('TD file chosen:', h.name);
    return true;
  }catch(e){
    console.log('pickTDFile error:', e);
    return false;
  }
}

/* บันทึกข้อมูลไปไฟล์ในรูปแบบ key=value (TouchDesigner อ่านง่าย) */
async function saveToTD(obj){
  try{
    if(!tdFileHandle){
      // พยายามกู้คืนจาก IndexedDB
      const saved = await idbGet(KEY);
      if(saved) tdFileHandle = saved;
    }
    if(!tdFileHandle){
      // ยังไม่เคยเลือก -> ขอให้ผู้ใช้เลือกครั้งเดียว
      const ok = await pickTDFile();
      if(!ok) { console.log('no TD file'); return; }
    }
    const ok = await ensureRW(tdFileHandle);
    if(!ok){ console.log('TD file permission missing'); return; }

    // เขียนไฟล์ (ทับทั้งไฟล์)
    const text = Object.entries(obj).map(([k,v])=>`${k}=${v}`).join('\n') + '\n';
    const w = await tdFileHandle.createWritable({ keepExistingData:false });
    await w.write(text);
    await w.close();
    console.log('TD file saved:\n' + text);
  }catch(e){
    console.log('saveToTD error:', e);
  }
}

/* กู้คืน handle อัตโนมัติหลังรีเฟรช (ไม่เด้งถาม) */
document.addEventListener('DOMContentLoaded', async () => {
  if(!('showOpenFilePicker' in window)){
    console.log('File System Access API not supported (ใช้ Chrome/Edge + http://localhost หรือ HTTPS)');
    return;
  }
  try{
    const saved = await idbGet(KEY);
    if(saved){
      tdFileHandle = saved;
      // อย่าขอ permission ทันที ปล่อยให้ขอตอน saveToTD เพื่อไม่กวนผู้ใช้
      console.log('TD file handle restored');
    }
  }catch(e){
    console.log('restore handle error:', e);
  }
});

function capturePhoto() {
    const shootButton = document.querySelector('.shoot-btn');
    
    // ถ้านับถอยหลังอยู่ ให้ไม่ทำอะไร
    if (shootButton.classList.contains('disabled')) {
        return;
    }

    // ปิดการใช้งานปุ่มชั่วคราว
    shootButton.classList.add('disabled');

    let countdown = 5;
    const countdownEl = document.getElementById('countdown-display');
    
    // แสดงตัวเลขนับถอยหลัง
    countdownEl.style.display = 'block';
    countdownEl.textContent = countdown;

    const countdownTimer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
            countdownEl.textContent = countdown;
        } else {
            // เมื่อนับถอยหลังครบ
            clearInterval(countdownTimer); // หยุดตัวจับเวลา
            countdownEl.style.display = 'none'; // ซ่อนตัวเลข
            doActualCapture(); // เรียกฟังก์ชันถ่ายรูปจริง
            // ปุ่มจะถูกเปิดใช้งานใหม่เมื่อกลับมาหน้ากล้องครั้งต่อไป (ผ่านฟังก์ชัน _showPage)
        }
    }, 1000); // ทำงานทุก 1 วินาที
}

// ฟังก์ชันนี้คือตรรกะการถ่ายรูปจริง
function doActualCapture() {
    const videoEl = document.getElementById('video');
    if (!videoEl) { console.warn('No #video element'); return; }

    canvas = document.createElement('canvas');
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    context = canvas.getContext('2d');
    context.drawImage(videoEl, 0, 0);

    capturedImageData = canvas.toDataURL('image/png');

    if (videoEl.srcObject) {
        videoEl.srcObject.getTracks().forEach(track => track.stop());
    }

    showPage('loadingPage');
    setTimeout(() => { processResult(); }, 3000);
}

        async function processResult() {
  let shownResult = false;   // ธงบอกว่าโชว์ผลสำเร็จแล้วหรือยัง
  try {
    let isSmiling = false;
    let useRealDetection = false;

    // ====== ตรวจจับรอยยิ้ม (เหมือนเดิม) ======
    if (modelsLoaded) {
      try {
        const detectionPromise = detectSmile(capturedImageData);
        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => reject(new Error('Detection timeout')), 5000);
        });
        isSmiling = await Promise.race([detectionPromise, timeoutPromise]);
        useRealDetection = true;
      } catch (err) {
        // ถ้าพัง ค่อยไปสุ่มทีหลัง
        console.warn('Smile detection failed, fallback to random:', err);
      }
    }
    if (!useRealDetection) {
      await new Promise(r => setTimeout(r, 1000)); // ให้เห็นหน้า loading นิดนึง
      isSmiling = Math.random() > 0.5;
    }

    // ====== ตัดสินหน้า result ======
    let resultPageId;
    if (totalScore >= 1 && totalScore < 9) {
      resultPageId = isSmiling ? 'resultNightBloom' : 'resultNightClose';
    } else if (totalScore >= 9 && totalScore < 17) {
      resultPageId = 'resultBud';
    } else if (totalScore >= 17 && totalScore < 25) {
      resultPageId = isSmiling ? 'resultEarlyBloom' : 'resultEarlyClosed';
    } else {
      // กันไว้เผื่อคะแนนหลุดช่วง
      resultPageId = 'resultBud';
    }

    // ====== โชว์ผลลัพธ์ "ก่อน" ทำงานอื่น เพื่อกันจังหวะเด้ง ======
    document.getElementById('capturedImage1').src = capturedImageData;
    document.getElementById('capturedImage2').src = capturedImageData;

        // โหลด face-api.js และโมเดลที่จำเป็น (เวอร์ชันเร็ว)
        async function loadFaceAPI() {
            try {
                console.log('Loading Face API models...');
                
                // ตั้งเวลาหมดอายุ 10 วินาที
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('Model loading timeout')), 10000);
                });
                
                // โหลดโมเดลแบบขนาดเล็กและเร็วกว่า
                const loadPromise = Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'),
                    faceapi.nets.faceExpressionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights')
                ]);
                
                // รอให้โหลดเสร็จหรือหมดเวลา
                await Promise.race([loadPromise, timeoutPromise]);
                
                console.log('Face API models loaded successfully');
                return true;
            } catch (error) {
                console.error('Error loading Face API models:', error);
                return false;
            }
        }

        // ตรวจจับรอยยิ้มจากรูปภาพ
        async function detectSmile(imageData) {
            try {
                // สร้าง element img ชั่วคราว
                const img = document.createElement('img');
                img.src = imageData;
                
                // รอให้รูปโหลดเสร็จ
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                });
                
                // ตรวจจับใบหน้าและอารมณ์
                const detections = await faceapi
                    .detectAllFaces(img, new faceapi.TinyFaceDetectorOptions())
                    .withFaceExpressions();
                
                // ถ้าไม่พบใบหน้า
                if (detections.length === 0) {
                    console.log('No face detected');
                    return false;
                }
                
                // ตรวจสอบอารมณ์ "happy" ของใบหน้าแรก
                const expressions = detections[0].expressions;
                const happyScore = expressions.happy;
                
                console.log('Face expressions:', expressions);
                console.log('Happy score:', happyScore);
                
                // ถ้าคะแนนความสุขมากกว่า 0.7 ถือว่ายิ้ม
                return happyScore > 0.7;
            } catch (error) {
                console.error('Error detecting smile:', error);
                throw error;
            }
        }

     function goHome(element, evt, force = false) {
  const e = evt || window.event;

  // ถ้ายังล็อกอยู่และไม่ได้ force -> ไม่กลับ
  if (!force && !canNavigate()) {
    console.warn('[HOME] blocked by lock');
    return;
  }

  // ripple effect (กัน error event undefined)
  if (element && e && e.clientX != null && e.clientY != null) {
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const rect = element.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top - size / 2;
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    element.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }

  // หยุดกล้องถ้ามี
  if (typeof video !== 'undefined' && video && video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
  }

  // ✅ ยิงค่าศูนย์กลับไปให้ TouchDesigner
  // (ไม่ await เพื่อไม่ให้ UI หน่วง; ถ้าพลาดจะ log ไว้เฉย ๆ)
  saveToTD({
    score: 0,
    smiling: 0,
    method: 'reset',      // แท็กไว้เฉย ๆ ว่ามาจากการรีเซ็ต
    result: 0,
    result_name: 'none',
    time: Date.now()
  }).catch(e => console.warn('saveToTD reset failed (ignored):', e));

  // รีเซ็ตสถานะฝั่งเว็บ
  currentQuestion = 1;
  totalScore = 0;
  selectedAnswers = {};
  capturedImageData = null;

  // ถ้ามีรูปแสดงอยู่ เคลียร์ src ออก (กันภาพค้าง)
  ['capturedImage','capturedImage1','capturedImage2','capturedImage3','capturedImage4','capturedImage5']
    .forEach(id => { const el = document.getElementById(id); if (el) el.src = ''; });

  // ปลดล็อก + ล้าง result id
  resultLockUntil = 0;
  if (typeof currentResultId !== 'undefined') currentResultId = null;

  // ไปหน้าแรก (ข้ามตัวล็อก เพราะเราตั้งใจกลับเอง)
  _showPage('homePage');
}

    <script>
/* ===== HARD LOCK ENFORCER (วางก่อน </body>) ===== */
function getActivePageId(){
  const el = document.querySelector('.page.active');
  return el ? el.id : null;
}

let currentResultId = null;

// 1) เอา showPage ปัจจุบันมาเก็บไว้ แล้วห่อด้วยการเช็คล็อก
const _origShowPage = window.showPage || function(pid){
  // fallback ถ้าไม่มี (ไม่น่าเกิด)
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pid)?.classList.add('active');
};

function guardedShowPage(pageId){
  // บล็อกการกลับบ้าน/เข้ากล้องระหว่างล็อก
  if ((pageId === 'homePage' || pageId === 'cameraPage') && Date.now() < (window.resultLockUntil || 0)) {
    console.warn('[NAV] blocked (hard lock active) ->', pageId);
    return;
  }
  // ผ่านได้
  _origShowPage(pageId);
  console.log('[NAV] ->', pageId, '(guarded)');
}
window.showPage = guardedShowPage;

// 2) ล็อกไม่ให้มีใคร override showPage ได้อีก
try {
  Object.defineProperty(window, 'showPage', { writable: false });
} catch(e) {
  console.warn('freeze showPage failed (non-critical):', e);
}

// 3) ตัวบังคับหน้า: ถ้าใครแอบสลับหน้า ระหว่างล็อก -> ดึงกลับ
setInterval(() => {
  if (!window.resultLockUntil || Date.now() >= window.resultLockUntil) return;
  if (!currentResultId) return;
  const act = getActivePageId();
  if (act && act !== currentResultId) {
    console.warn('[ENFORCE] revert', act, '->', currentResultId);
    // ใช้ _showPage ถ้ามี (เร็วกว่า) ไม่ผ่านตัวล็อกเพราะเราตั้งใจบังคับเอง
    if (typeof window._showPage === 'function') {
      window._showPage(currentResultId);
    } else {
      _origShowPage(currentResultId);
    }
  }
}, 150);

// 4) ฟังก์ชันตั้งล็อก + โอเวอร์เลย์โชว์เวลา
function setResultLock(pageId, seconds = 10){
  currentResultId = pageId;
  window.resultLockUntil = Date.now() + seconds * 1000;
  showLockOverlay(seconds);
}

// overlay นับถอยหลัง
let _lockTimer;
function showLockOverlay(seconds){
  // สร้าง overlay หนึ่งครั้ง
  let box = document.getElementById('lockOverlay');
  if (!box) {
    box = document.createElement('div');
    box.id = 'lockOverlay';
    Object.assign(box.style, {
      position:'fixed', right:'16px', top:'16px',
      background:'rgba(0,0,0,0.6)', color:'#fff',
      padding:'8px 12px', borderRadius:'12px',
      font:'14px/1.4 sans-serif', zIndex: 5000,
      pointerEvents:'none'
    });
    document.body.appendChild(box);
  }
  clearInterval(_lockTimer);
  const end = Date.now() + seconds*1000;
  _lockTimer = setInterval(()=>{
    const remain = Math.max(0, end - Date.now());
    box.textContent = `Result locked: ${(remain/1000).toFixed(1)}s`;
    if (remain <= 0){
      clearInterval(_lockTimer);
      box.textContent = 'Unlocked';
      setTimeout(()=> box.remove(), 800);
    }
  }, 100);
}

// 5) เผยแพร่ให้ processResult เรียกง่าย ๆ
window.setResultLock = setResultLock;
</script>
